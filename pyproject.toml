[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
  ".git",
  ".venv",
  "venv",
  "__pycache__",
  ".pytest_cache",
  ".ruff_cache",
]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle errors
  "F",   # pyflakes
  "I",   # import sorting
  "UP",  # pyupgrade
  "B",   # flake8-bugbear
]
ignore = [
  "B008", # FastAPI commonly uses Depends()/Query()/Body() in defaults
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
skip-magic-trailing-comma = false
docstring-code-format = true

[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-q -ra"
testpaths = [
  "services",
  "jobs",
]
python_files = ["test_*.py"]
python_functions = ["test_*"]
asyncio_mode = "auto"

filterwarnings = [
  "ignore::DeprecationWarning",
]

[tool.coverage.run]
branch = true
source = [
  "services/router_api",
  "services/retrieval_service",
  "services/inference_worker",
  "jobs/ingest",
]

[tool.coverage.report]
show_missing = true
skip_empty = true
