global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: router_api
    metrics_path: /metrics
    static_configs:
      - targets: ["router_api:8000"]
        labels:
          service: router_api

  - job_name: retrieval_service
    metrics_path: /metrics
    static_configs:
      - targets: ["retrieval_service:8000"]
        labels:
          service: retrieval_service

  - job_name: inference_worker
    metrics_path: /metrics
    static_configs:
      - targets: ["inference_worker:8000"]
        labels:
          service: inference_worker
